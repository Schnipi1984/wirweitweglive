<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--ink:#1e1e2e;--off:#fff9ee;--white:#fff;--mid:#6b7280;--border:#e2e8f0;--green:#0e9f6e;--greenlt:#d1fae5;--mint:#6ee7b7;--r:12px;--rLg:20px;--maxW:1280px;}
body{font-family:'Nunito',sans-serif;font-size:1rem;line-height:1.84;color:var(--ink);background:var(--off);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh;}
a{text-decoration:none;color:inherit;}
.nav{position:sticky;top:0;z-index:900;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:var(--maxW);margin:0 auto;padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Fraunces',serif;font-weight:900;font-size:1.5rem;letter-spacing:-.04em;color:var(--ink);}
.logo span{color:var(--green);}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;}
.card{background:var(--white);border-radius:var(--rLg);padding:2.5rem 2rem;max-width:480px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.07);}
.icon{font-size:3rem;margin-bottom:1rem;}
h1{font-family:'Fraunces',serif;font-weight:900;font-size:1.8rem;color:var(--ink);margin-bottom:.75rem;line-height:1.2;}
h1 em{font-weight:300;font-style:italic;color:var(--green);}
.sub{color:var(--mid);font-size:.95rem;margin-bottom:2rem;line-height:1.6;}
.dl-btn{display:inline-block;background:var(--green);color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;padding:.85rem 2rem;border-radius:100px;transition:background .2s;}
.dl-btn:hover{background:#0b875e;}
.back{margin-top:1.5rem;font-size:.85rem;color:var(--mid);}
.back a{color:var(--green);font-weight:700;}

/* Sub-Drop Flyout */
.nav-sub-wrap{position:relative;display:block;}
.nav-sub-drop{display:none;position:absolute;left:calc(100% + 4px);top:-4px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:6px;min-width:185px;box-shadow:0 8px 28px rgba(0,0,0,.12);z-index:9999;}
.nav-sub-wrap:hover>.nav-sub-drop{display:block;}
.nav-sub-drop a{display:flex;align-items:center;gap:.55rem;font-size:.82rem;font-weight:600;color:#6b7280;padding:.4rem .7rem;border-radius:8px;white-space:nowrap;}
.nav-sub-drop a:hover{background:#fff9ee;color:#0e9f6e;}
.nav-sub-arr{font-size:.65rem;color:#b0b8c8;margin-left:auto;padding-left:.3rem;}
</style>
